<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neko Neko</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    .container {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1 {
      font-size: clamp(4.5rem, 12vw, 9rem);
      font-weight: 900;
      letter-spacing: -2px;
      background: linear-gradient(90deg, #f0f, #7b00ff, #00ffff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 40px rgba(180, 0, 255, 0.6);
      z-index: 2;
    }

    /* Floating Bitcoin */
    .bitcoin-float {
      position: absolute;
      font-size: 8rem;
      opacity: 0.15;
      pointer-events: none;
      user-select: none;
      animation: float 18s infinite ease-in-out;
      z-index: 1;
    }

    .bitcoin-float:nth-child(1) { top: 12%; left: 8%;  animation-delay: 0s;    }
    .bitcoin-float:nth-child(2) { top: 28%; right: 10%; animation-delay: 4s;   }
    .bitcoin-float:nth-child(3) { bottom: 18%; left: 15%; animation-delay: 8s; }
    .bitcoin-float:nth-child(4) { bottom: 25%; right: 12%; animation-delay: 12s;}

    @keyframes float {
      0%, 100%   { transform: translateY(0) rotate(0deg); }
      50%        { transform: translateY(-60px) rotate(12deg); }
    }

    .btn-magic {
      margin-top: 3rem;
      padding: 1.2rem 3.5rem;
      font-size: 1.6rem;
      font-weight: bold;
      color: white;
      background: linear-gradient(45deg, #e91e63, #ff4081);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      box-shadow: 0 10px 30px rgba(233, 30, 99, 0.5);
      transition: all 0.35s ease;
      z-index: 2;
    }

    .btn-magic:hover {
      transform: translateY(-8px) scale(1.06);
      box-shadow: 0 20px 50px rgba(233, 30, 99, 0.7);
      background: linear-gradient(45deg, #ff4081, #e91e63);
    }

    .btn-magic:active {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Floating Bitcoin symbols -->
    <div class="bitcoin-float">₿</div>
    <div class="bitcoin-float">₿</div>
    <div class="bitcoin-float">₿</div>
    <div class="bitcoin-float">₿</div>

    <h1>Neko Neko</h1>

    <a 
      href="https://magiceden.io/ordinals/marketplace/nekoneko?gr" 
      target="_blank" 
      rel="noopener noreferrer"
      class="btn-magic"
    >
      Magic Eden
    </a>
  </div>
</body>
</html>
